<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Task Manager — ONE SW TEAM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-authentication-library/2.38.0/msal-browser.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue-dark: #1F4E79; --blue-mid: #2E75B6; --blue-light: #BDD7EE; --blue-pale: #E6F1FB;
  --green: #375623; --green-bg: #E2EFDA; --orange: #833C00; --orange-bg: #FCE4D6;
  --red: #C00000; --red-bg: #FFE7E7; --gray: #5F5E5A; --gray-bg: #F1EFE8;
  --white: #ffffff; --surface: #F5F7FA; --border: #D1D5DB; --text: #1a1a1a; --muted: #6B7280;
}
body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; }

/* LOGIN */
#loginScreen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }
.login-card { background:white; border-radius:16px; padding:48px 40px; text-align:center; border:1px solid var(--border); width:380px; }
.login-icon { width:60px; height:60px; background:var(--blue-dark); border-radius:14px; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:28px; }
.login-card h1 { font-size:22px; font-weight:600; color:var(--blue-dark); margin-bottom:8px; }
.login-card p { font-size:14px; color:var(--muted); margin-bottom:32px; line-height:1.6; }
.btn-signin { width:100%; padding:13px; background:var(--blue-dark); color:white; border:none; border-radius:10px; font-size:15px; font-weight:500; cursor:pointer; }
.btn-signin:hover { background:var(--blue-mid); }
.login-note { margin-top:16px; font-size:12px; color:var(--muted); }

/* APP */
#app { display:none; flex-direction:column; min-height:100vh; }
.topbar { background:var(--blue-dark); color:white; padding:0 24px; height:54px; display:flex; align-items:center; justify-content:space-between; }
.topbar-title { font-size:15px; font-weight:600; }
.topbar-right { display:flex; align-items:center; gap:12px; }
.user-info { font-size:13px; opacity:0.85; }
.btn-signout { padding:5px 14px; border:1.5px solid rgba(255,255,255,0.4); background:transparent; color:white; border-radius:8px; font-size:12px; cursor:pointer; }
.btn-signout:hover { background:rgba(255,255,255,0.15); }

.filter-bar { background:var(--blue-dark); padding:0 24px 12px; display:flex; gap:6px; flex-wrap:wrap; }
.ftab { padding:5px 16px; border-radius:20px; font-size:12px; cursor:pointer; border:1.5px solid rgba(255,255,255,0.35); color:rgba(255,255,255,0.85); background:transparent; transition:all 0.15s; }
.ftab:hover { border-color:white; color:white; }
.ftab.active { background:white; color:var(--blue-dark); border-color:white; font-weight:600; }

.summary-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; padding:16px 20px 0; }
.scard { background:white; border-radius:12px; padding:14px 16px; border:1px solid var(--border); cursor:pointer; transition:border-color 0.15s; }
.scard:hover { border-color:var(--blue-mid); }
.scard-label { font-size:11px; color:var(--muted); margin-bottom:4px; font-weight:500; text-transform:uppercase; letter-spacing:0.4px; }
.scard-num { font-size:26px; font-weight:700; }
.n-gray { color:var(--gray); } .n-blue { color:var(--blue-dark); } .n-amber { color:var(--orange); } .n-green { color:var(--green); }

.below-summary { display:flex; flex:1; overflow:hidden; margin-top:14px; }
.sidebar { width:310px; min-width:310px; background:white; border-right:1px solid var(--border); display:flex; flex-direction:column; height:calc(100vh - 54px - 40px - 110px); }
.sidebar-top { padding:10px; border-bottom:1px solid var(--border); display:flex; gap:8px; }
.search-input { flex:1; border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:13px; outline:none; color:var(--text); background:var(--surface); }
.search-input:focus { border-color:var(--blue-mid); }
.btn-new { padding:8px 14px; background:var(--blue-dark); color:white; border:none; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap; }
.btn-new:hover { background:var(--blue-mid); }
.task-list { flex:1; overflow-y:auto; }
.task-item { padding:11px 13px; border-bottom:1px solid var(--border); cursor:pointer; }
.task-item:hover { background:var(--surface); }
.task-item.selected { background:var(--blue-pale); border-left:3px solid var(--blue-dark); }
.task-item-title { font-size:13px; font-weight:600; margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.task-meta { display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
.badge { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.b-inprogress { background:var(--blue-pale); color:var(--blue-dark); }
.b-onhold { background:var(--orange-bg); color:var(--orange); }
.b-notstarted { background:var(--gray-bg); color:var(--gray); }
.b-completed { background:var(--green-bg); color:var(--green); }
.b-cancelled { background:var(--red-bg); color:var(--red); }
.b-high { background:var(--red-bg); color:var(--red); }
.b-medium { background:var(--orange-bg); color:var(--orange); }
.b-low { background:var(--blue-pale); color:var(--blue-dark); }
.task-assignee { font-size:11px; color:var(--muted); }
.empty-state { padding:40px 20px; text-align:center; color:var(--muted); font-size:14px; }

.content-area { flex:1; padding:0 18px 18px; display:flex; flex-direction:column; overflow-y:auto; height:calc(100vh - 54px - 40px - 110px); }
.detail-panel { background:white; border-radius:14px; border:1px solid var(--border); overflow:hidden; flex:1; }
.detail-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.detail-title { font-size:15px; font-weight:600; }
.detail-actions { display:flex; gap:8px; }
.btn-edit { padding:7px 16px; background:var(--blue-dark); color:white; border:none; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; }
.btn-edit:hover { background:var(--blue-mid); }
.btn-del { padding:7px 12px; background:white; color:var(--red); border:1px solid var(--border); border-radius:8px; font-size:13px; cursor:pointer; }
.btn-del:hover { background:var(--red-bg); }
.detail-grid { padding:16px 18px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.field { display:flex; flex-direction:column; gap:4px; }
.field.full { grid-column:span 2; }
.field-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
.field-val { font-size:13px; background:var(--surface); border-radius:8px; padding:8px 11px; min-height:34px; display:flex; align-items:center; }
.metrics { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; padding:0 18px 14px; }
.mcard { background:var(--surface); border-radius:10px; padding:10px; text-align:center; border:1px solid var(--border); }
.mcard-label { font-size:10px; color:var(--muted); margin-bottom:3px; }
.mcard-val { font-size:18px; font-weight:700; color:var(--blue-dark); }
.head-section { margin:0 18px 16px; padding:12px; background:var(--blue-pale); border-radius:10px; border:1px solid var(--blue-light); }
.head-label { font-size:12px; color:var(--blue-dark); font-weight:600; margin-bottom:6px; }
.head-ta { width:100%; border:1px solid var(--blue-light); border-radius:8px; padding:8px 11px; font-size:13px; color:var(--text); background:white; resize:vertical; min-height:64px; font-family:inherit; outline:none; }
.head-ta:focus { border-color:var(--blue-mid); }
.btn-save-hc { margin-top:7px; padding:6px 16px; background:var(--blue-dark); color:white; border:none; border-radius:8px; font-size:13px; cursor:pointer; }
.no-sel { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; color:var(--muted); font-size:14px; text-align:center; padding:60px 20px; }
.no-sel-icon { font-size:48px; margin-bottom:14px; opacity:0.3; }

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:white; border-radius:16px; width:640px; max-width:95vw; max-height:90vh; overflow-y:auto; }
.modal-header { padding:18px 22px 14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:white; z-index:1; }
.modal-title { font-size:16px; font-weight:600; }
.btn-close { background:none; border:none; font-size:22px; cursor:pointer; color:var(--muted); line-height:1; }
.modal-body { padding:18px 22px; display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.ff { display:flex; flex-direction:column; gap:4px; }
.ff.full { grid-column:span 2; }
.ff label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px; }
.ff input, .ff select, .ff textarea { border:1px solid var(--border); border-radius:8px; padding:8px 11px; font-size:13px; color:var(--text); outline:none; font-family:inherit; width:100%; background:white; }
.ff input:focus, .ff select:focus, .ff textarea:focus { border-color:var(--blue-mid); }
.ff textarea { resize:vertical; min-height:72px; }
.modal-footer { padding:14px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; position:sticky; bottom:0; background:white; }
.btn-cancel { padding:8px 18px; background:white; color:var(--text); border:1px solid var(--border); border-radius:8px; font-size:13px; cursor:pointer; }
.btn-submit { padding:8px 22px; background:var(--blue-dark); color:white; border:none; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; }
.btn-submit:hover { background:var(--blue-mid); }
.btn-submit:disabled { opacity:0.6; cursor:not-allowed; }

/* LOADING OVERLAY */
#loadingOverlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,0.8); z-index:500; align-items:center; justify-content:center; flex-direction:column; gap:14px; font-size:14px; color:var(--muted); }
#loadingOverlay.show { display:flex; }
.spinner { width:32px; height:32px; border:3px solid var(--blue-light); border-top-color:var(--blue-dark); border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

.toast { position:fixed; bottom:24px; right:24px; padding:11px 18px; border-radius:10px; font-size:13px; z-index:9999; display:none; }
.toast.success { background:var(--green); color:white; }
.toast.error { background:var(--red); color:white; }
.toast.info { background:var(--blue-dark); color:white; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">📋</div>
    <h1>Task Manager</h1>
    <p>ONE SW TEAM<br/>Sign in with your Microsoft account to manage and track your team's tasks.</p>
    <button class="btn-signin" onclick="signIn()">Sign in with Microsoft</button>
    <p class="login-note">You will be asked to approve access on first sign-in</p>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <span class="topbar-title">📋 Task Manager — ONE SW TEAM</span>
    <div class="topbar-right">
      <span class="user-info" id="userInfo"></span>
      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>
  </div>
  <div class="filter-bar">
    <button class="ftab active" onclick="setFilter('All',this)">All</button>
    <button class="ftab" onclick="setFilter('Not Started',this)">Not Started</button>
    <button class="ftab" onclick="setFilter('In Progress',this)">In Progress</button>
    <button class="ftab" onclick="setFilter('On Hold',this)">On Hold</button>
    <button class="ftab" onclick="setFilter('Completed',this)">Completed</button>
    <button class="ftab" onclick="setFilter('Cancelled',this)">Cancelled</button>
  </div>
  <div class="summary-row">
    <div class="scard" onclick="setFilter('All',document.querySelector('.ftab'))">
      <div class="scard-label">Total Tasks</div>
      <div class="scard-num n-gray" id="cnt-all">0</div>
    </div>
    <div class="scard">
      <div class="scard-label">In Progress</div>
      <div class="scard-num n-blue" id="cnt-ip">0</div>
    </div>
    <div class="scard">
      <div class="scard-label">On Hold</div>
      <div class="scard-num n-amber" id="cnt-oh">0</div>
    </div>
    <div class="scard">
      <div class="scard-label">Completed</div>
      <div class="scard-num n-green" id="cnt-done">0</div>
    </div>
  </div>
  <div class="below-summary">
    <div class="sidebar">
      <div class="sidebar-top">
        <input class="search-input" id="searchBox" placeholder="Search tasks..." oninput="renderList()"/>
        <button class="btn-new" onclick="openModal()">+ New</button>
      </div>
      <div class="task-list" id="taskList"></div>
    </div>
    <div class="content-area" id="contentArea">
      <div class="no-sel"><div class="no-sel-icon">📄</div>Select a task to view details</div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">New Task</span>
      <button class="btn-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="ff full"><label>Task Title *</label><input id="f-title" placeholder="Enter task title"/></div>
      <div class="ff"><label>Job Type</label>
        <select id="f-jobtype"><option value="">Select...</option><option>Development</option><option>Bug Fix</option><option>Testing</option><option>Support</option><option>Feature Update</option><option>Meeting</option><option>Other</option></select>
      </div>
      <div class="ff"><label>Priority</label>
        <select id="f-priority"><option value="">Select...</option><option>High</option><option>Medium</option><option>Low</option></select>
      </div>
      <div class="ff"><label>Status</label>
        <select id="f-status"><option>Not Started</option><option>In Progress</option><option>On Hold</option><option>Completed</option><option>Cancelled</option></select>
      </div>
      <div class="ff"><label>Assigned To (name)</label><input id="f-assigned" placeholder="Team member name"/></div>
      <div class="ff"><label>Planned Start Date</label><input type="date" id="f-startdate"/></div>
      <div class="ff"><label>Planned End Date</label><input type="date" id="f-enddate"/></div>
      <div class="ff"><label>Planned Days</label><input type="number" id="f-planneddays" min="0" placeholder="0"/></div>
      <div class="ff"><label>Days Spent</label><input type="number" id="f-daysspent" min="0" placeholder="0"/></div>
      <div class="ff"><label>Planned Hrs</label><input type="number" id="f-plannedhrs" min="0" placeholder="0"/></div>
      <div class="ff"><label>Actual Hrs</label><input type="number" id="f-actualhrs" min="0" placeholder="0"/></div>
      <div class="ff"><label>Feature Updates Days</label><input type="number" id="f-fudays" min="0" placeholder="0"/></div>
      <div class="ff"><label>Feature Updates Hrs</label><input type="number" id="f-fuhrs" min="0" placeholder="0"/></div>
      <div class="ff full"><label>Description</label><textarea id="f-desc" placeholder="Describe the task..."></textarea></div>
      <div class="ff full"><label>Comments / Notes</label><textarea id="f-notes" placeholder="Add any notes..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" id="btnSubmit" onclick="submitTask()">Save Task</button>
    </div>
  </div>
</div>

<div id="loadingOverlay"><div class="spinner"></div><span id="loadingMsg">Loading tasks...</span></div>
<div class="toast" id="toast"></div>

<script>
const CLIENT_ID = '986b7936-6193-4547-8061-4dc0d7dfa048';
const SITE_HOSTNAME = 'ariesmar.sharepoint.com';
const SITE_PATH = '/sites/ONESWTEAM';
const LIST_NAME = 'Task Manager';
const HEAD_EMAILS = []; // Add head/manager emails here e.g. ['manager@ariesmar.com']

const msalCfg = {
  auth: {
    clientId: CLIENT_ID,
    authority: 'https://login.microsoftonline.com/common',
    redirectUri: window.location.href.split('?')[0].split('#')[0]
  },
  cache: { cacheLocation: 'localStorage' }
};

const msal = new msal.PublicClientApplication(msalCfg);
const SCOPES = ['https://graph.microsoft.com/Sites.ReadWrite.All','https://graph.microsoft.com/User.Read'];

let tasks=[], currentFilter='All', selectedId=null, editingId=null, isHead=false, siteId='', listId='';

async function signIn() {
  try {
    const res = await msal.loginPopup({ scopes: SCOPES });
    msal.setActiveAccount(res.account);
    await boot(res.account);
  } catch(e) { toast('Sign in failed: ' + e.message, 'error'); }
}

function signOut() {
  msal.logoutPopup();
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
}

async function getToken() {
  const acct = msal.getActiveAccount();
  const res = await msal.acquireTokenSilent({ scopes: SCOPES, account: acct });
  return res.accessToken;
}

async function api(url, method='GET', body=null) {
  const token = await getToken();
  const opts = { method, headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('https://graph.microsoft.com/v1.0' + url, opts);
  if (r.status === 204) return null;
  const data = await r.json();
  if (!r.ok) throw new Error(data.error?.message || r.statusText);
  return data;
}

async function boot(account) {
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('app').style.flexDirection='column';
  document.getElementById('userInfo').textContent = account.name || account.username;
  isHead = HEAD_EMAILS.map(e=>e.toLowerCase()).includes((account.username||'').toLowerCase());
  showLoading('Connecting to SharePoint...');
  try {
    const site = await api(`/sites/${SITE_HOSTNAME}:${SITE_PATH}`);
    siteId = site.id;
    const lists = await api(`/sites/${siteId}/lists?$filter=displayName eq '${LIST_NAME}'`);
    if (!lists.value.length) throw new Error(`List "${LIST_NAME}" not found. Check the list name in SharePoint.`);
    listId = lists.value[0].id;
    await loadTasks();
  } catch(e) {
    hideLoading();
    toast('Connection error: ' + e.message, 'error');
  }
}

async function loadTasks() {
  showLoading('Loading tasks...');
  try {
    const sel = 'Title,Job_x0020_Type,Description,Comments_x0020_Notes,Priority,Status,Assigned_x0020_To,Planned_x0020_Start_x0020_Date,Planned_x0020_End_x0020_Date,Planned_x0020_Days,Days_x0020_Spent,Planned_x0020_Hrs,Actual_x0020_Hrs,Feature_x0020_Updates_x0020_Days,Feature_x0020_Updates_x0020_Hrs,Head_x0020_Comments';
    const data = await api(`/sites/${siteId}/lists/${listId}/items?expand=fields(select=${sel})&$top=999&$orderby=fields/Created desc`);
    tasks = data.value.map(i => ({ id: i.id, ...i.fields }));
    updateCards();
    renderList();
  } catch(e) { toast('Error loading: ' + e.message, 'error'); }
  hideLoading();
}

function updateCards() {
  document.getElementById('cnt-all').textContent = tasks.length;
  document.getElementById('cnt-ip').textContent = tasks.filter(t=>t.Status==='In Progress').length;
  document.getElementById('cnt-oh').textContent = tasks.filter(t=>t.Status==='On Hold').length;
  document.getElementById('cnt-done').textContent = tasks.filter(t=>t.Status==='Completed').length;
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  selectedId = null;
  document.getElementById('contentArea').innerHTML = '<div class="no-sel"><div class="no-sel-icon">📄</div>Select a task to view details</div>';
  renderList();
}

function filtered() {
  const q = (document.getElementById('searchBox').value||'').toLowerCase();
  return tasks.filter(t => {
    const okFilter = currentFilter==='All' || t.Status===currentFilter;
    const okSearch = !q || (t.Title||'').toLowerCase().includes(q) || (t.Description||'').toLowerCase().includes(q) || (t['Assigned_x0020_To']||'').toLowerCase().includes(q);
    return okFilter && okSearch;
  });
}

function sc(s) { const m={'In Progress':'inprogress','On Hold':'onhold','Not Started':'notstarted','Completed':'completed','Cancelled':'cancelled'}; return 'b-'+(m[s]||'notstarted'); }
function pc(p) { return 'b-'+(p||'').toLowerCase(); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(d) { if(!d) return '—'; try { return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); } catch(e){ return d; } }

function renderList() {
  const list = filtered();
  const el = document.getElementById('taskList');
  if (!list.length) { el.innerHTML='<div class="empty-state">No tasks found</div>'; return; }
  el.innerHTML = list.map(t=>`
    <div class="task-item ${t.id===selectedId?'selected':''}" onclick="selectTask('${t.id}')">
      <div class="task-item-title">${esc(t.Title||'Untitled')}</div>
      <div class="task-meta">
        <span class="badge ${sc(t.Status)}">${esc(t.Status||'Not Started')}</span>
        ${t.Priority?`<span class="badge ${pc(t.Priority)}">${esc(t.Priority)}</span>`:''}
        ${t['Assigned_x0020_To']?`<span class="task-assignee">${esc(t['Assigned_x0020_To'])}</span>`:''}
      </div>
    </div>`).join('');
}

function selectTask(id) {
  selectedId = id;
  renderList();
  const t = tasks.find(x=>x.id===id);
  if(!t) return;
  const fv = v=>`<div class="field-val">${esc(v||'—')}</div>`;
  const fb = (v,cls)=>v?`<div class="field-val"><span class="badge ${cls}">${esc(v)}</span></div>`:`<div class="field-val">—</div>`;
  document.getElementById('contentArea').innerHTML = `
  <div class="detail-panel">
    <div class="detail-header">
      <div class="detail-title">${esc(t.Title||'Untitled')}</div>
      <div class="detail-actions">
        <button class="btn-del" onclick="deleteTask('${t.id}')">🗑 Delete</button>
        <button class="btn-edit" onclick="openModal('${t.id}')">✏️ Edit</button>
      </div>
    </div>
    <div class="detail-grid">
      <div class="field"><div class="field-label">Job Type</div>${fv(t['Job_x0020_Type'])}</div>
      <div class="field"><div class="field-label">Status</div>${fb(t.Status,sc(t.Status))}</div>
      <div class="field"><div class="field-label">Priority</div>${fb(t.Priority,pc(t.Priority))}</div>
      <div class="field"><div class="field-label">Assigned To</div>${fv(t['Assigned_x0020_To'])}</div>
      <div class="field"><div class="field-label">Planned Start</div>${fv(fmtDate(t['Planned_x0020_Start_x0020_Date']))}</div>
      <div class="field"><div class="field-label">Planned End</div>${fv(fmtDate(t['Planned_x0020_End_x0020_Date']))}</div>
      <div class="field full"><div class="field-label">Description</div>${fv(t.Description)}</div>
      <div class="field full"><div class="field-label">Comments / Notes</div>${fv(t['Comments_x0020_Notes'])}</div>
    </div>
    <div class="metrics">
      <div class="mcard"><div class="mcard-label">Planned Days</div><div class="mcard-val">${t['Planned_x0020_Days']||0}</div></div>
      <div class="mcard"><div class="mcard-label">Days Spent</div><div class="mcard-val">${t['Days_x0020_Spent']||0}</div></div>
      <div class="mcard"><div class="mcard-label">Planned Hrs</div><div class="mcard-val">${t['Planned_x0020_Hrs']||0}</div></div>
      <div class="mcard"><div class="mcard-label">Actual Hrs</div><div class="mcard-val">${t['Actual_x0020_Hrs']||0}</div></div>
      <div class="mcard"><div class="mcard-label">FU Days/Hrs</div><div class="mcard-val">${t['Feature_x0020_Updates_x0020_Days']||0}/${t['Feature_x0020_Updates_x0020_Hrs']||0}</div></div>
    </div>
    ${isHead?`
    <div class="head-section">
      <div class="head-label">🔒 Head Comments (Manager only)</div>
      <textarea class="head-ta" id="hcInput">${esc(t['Head_x0020_Comments']||'')}</textarea>
      <button class="btn-save-hc" onclick="saveHeadComment('${t.id}')">Save Comment</button>
    </div>`:''}
  </div>`;
}

function openModal(id=null) {
  editingId=id;
  document.getElementById('modalTitle').textContent = id?'Edit Task':'New Task';
  const ids=['title','jobtype','priority','status','assigned','startdate','enddate','planneddays','daysspent','plannedhrs','actualhrs','fudays','fuhrs','desc','notes'];
  ids.forEach(i=>{ const el=document.getElementById('f-'+i); if(el) el.value=''; });
  document.getElementById('f-status').value='Not Started';
  if(id) {
    const t=tasks.find(x=>x.id===id);
    if(t){
      document.getElementById('f-title').value=t.Title||'';
      document.getElementById('f-jobtype').value=t['Job_x0020_Type']||'';
      document.getElementById('f-priority').value=t.Priority||'';
      document.getElementById('f-status').value=t.Status||'Not Started';
      document.getElementById('f-assigned').value=t['Assigned_x0020_To']||'';
      document.getElementById('f-startdate').value=(t['Planned_x0020_Start_x0020_Date']||'').split('T')[0];
      document.getElementById('f-enddate').value=(t['Planned_x0020_End_x0020_Date']||'').split('T')[0];
      document.getElementById('f-planneddays').value=t['Planned_x0020_Days']||'';
      document.getElementById('f-daysspent').value=t['Days_x0020_Spent']||'';
      document.getElementById('f-plannedhrs').value=t['Planned_x0020_Hrs']||'';
      document.getElementById('f-actualhrs').value=t['Actual_x0020_Hrs']||'';
      document.getElementById('f-fudays').value=t['Feature_x0020_Updates_x0020_Days']||'';
      document.getElementById('f-fuhrs').value=t['Feature_x0020_Updates_x0020_Hrs']||'';
      document.getElementById('f-desc').value=t.Description||'';
      document.getElementById('f-notes').value=t['Comments_x0020_Notes']||'';
    }
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal(){ document.getElementById('modal').classList.remove('open'); editingId=null; }

async function submitTask() {
  const title=(document.getElementById('f-title').value||'').trim();
  if(!title){ toast('Task title is required','error'); return; }
  const btn=document.getElementById('btnSubmit');
  btn.disabled=true; btn.textContent='Saving...';
  const fields = {
    Title: title,
    Job_x0020_Type: document.getElementById('f-jobtype').value||null,
    Priority: document.getElementById('f-priority').value||null,
    Status: document.getElementById('f-status').value,
    Assigned_x0020_To: document.getElementById('f-assigned').value||null,
    Planned_x0020_Start_x0020_Date: document.getElementById('f-startdate').value||null,
    Planned_x0020_End_x0020_Date: document.getElementById('f-enddate').value||null,
    Planned_x0020_Days: Number(document.getElementById('f-planneddays').value)||null,
    Days_x0020_Spent: Number(document.getElementById('f-daysspent').value)||null,
    Planned_x0020_Hrs: Number(document.getElementById('f-plannedhrs').value)||null,
    Actual_x0020_Hrs: Number(document.getElementById('f-actualhrs').value)||null,
    Feature_x0020_Updates_x0020_Days: Number(document.getElementById('f-fudays').value)||null,
    Feature_x0020_Updates_x0020_Hrs: Number(document.getElementById('f-fuhrs').value)||null,
    Description: document.getElementById('f-desc').value||null,
    Comments_x0020_Notes: document.getElementById('f-notes').value||null,
  };
  try {
    if(editingId) {
      await api(`/sites/${siteId}/lists/${listId}/items/${editingId}`,'PATCH',{fields});
      toast('Task updated!','success');
    } else {
      await api(`/sites/${siteId}/lists/${listId}/items`,'POST',{fields});
      toast('Task created!','success');
    }
    closeModal();
    const prevId = editingId;
    await loadTasks();
    if(prevId) selectTask(prevId);
  } catch(e){ toast('Error: '+e.message,'error'); }
  btn.disabled=false; btn.textContent='Save Task';
}

async function saveHeadComment(id) {
  try {
    const val=document.getElementById('hcInput').value;
    await api(`/sites/${siteId}/lists/${listId}/items/${id}`,'PATCH',{fields:{Head_x0020_Comments:val}});
    toast('Comment saved!','success');
    await loadTasks(); selectTask(id);
  } catch(e){ toast('Error: '+e.message,'error'); }
}

async function deleteTask(id) {
  if(!confirm('Delete this task? This cannot be undone.')) return;
  try {
    await api(`/sites/${siteId}/lists/${listId}/items/${id}`,'DELETE');
    toast('Task deleted','success');
    selectedId=null;
    document.getElementById('contentArea').innerHTML='<div class="no-sel"><div class="no-sel-icon">📄</div>Select a task to view details</div>';
    await loadTasks();
  } catch(e){ toast('Error: '+e.message,'error'); }
}

function showLoading(msg='Loading...') { document.getElementById('loadingMsg').textContent=msg; document.getElementById('loadingOverlay').classList.add('show'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }
function toast(msg,type='info') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+type; el.style.display='block';
  setTimeout(()=>el.style.display='none',3500);
}

(async()=>{
  await msal.initialize();
  const accounts=msal.getAllAccounts();
  if(accounts.length){ msal.setActiveAccount(accounts[0]); await boot(accounts[0]); }
})();
</script>
</body>
</html>
